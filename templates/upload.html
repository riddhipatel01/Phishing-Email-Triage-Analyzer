<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Phishing Triage Analyzer</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; color: #1a1a1a; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    p.sub { color: #666; font-size: 14px; margin-bottom: 32px; }
    .card { border: 1px solid #e0e0e0; border-radius: 12px; padding: 32px; }
    input[type=file] { display: block; width: 100%; padding: 12px; border: 1px dashed #ccc; border-radius: 8px; margin-bottom: 16px; font-size: 14px; cursor: pointer; box-sizing: border-box; }
    button { background: #1a1a1a; color: #fff; border: none; padding: 12px 28px; border-radius: 8px; font-size: 15px; cursor: pointer; }
    button:hover { background: #333; }
    .error { background: #fff0f0; border: 1px solid #f5c1c1; color: #991f1f; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .note { font-size: 12px; color: #999; margin-top: 16px; }
  </style>
</head>
<body>
  <h1>Phishing Triage Analyzer</h1>
  <p class="sub">Upload a .eml file to get a structured triage report.</p>
  <div class="card">
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/analyze" enctype="multipart/form-data">
      <input type="file" name="file" accept=".eml" required>
      <button type="submit">Analyze email</button>
    </form>
    <p class="note">File stays local. Nothing is stored or sent except IOCs to VirusTotal.</p>
  </div>
</body>
</html>
